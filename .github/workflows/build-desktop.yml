name: Build Desktop App

on:
  push:
    branches:
      - main
    tags:
      - 'v*' # Triggers build when you push a version tag (e.g., v1.0.0)
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build-tauri:
    permissions:
      contents: write # Crucial for creating releases and uploading build artifacts
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            args: '--target aarch64-apple-darwin' # macOS Apple Silicon
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            args: '--target x86_64-apple-darwin'  # macOS Intel
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            args: '--target x86_64-pc-windows-msvc' # Windows x64
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
            args: '--target x86_64-unknown-linux-gnu' # Linux x64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Updated to Node 22 to avoid deprecation warnings
          cache: 'npm'
          cache-dependency-path: 'desktop/package-lock.json'

      # 2. Setup Rust toolchain (required for Tauri core compiling)
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # 3. Cache Rust build artifacts to speed up subsequent workflow runs
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'desktop/src-tauri -> target'

      # 4. Install OS-level dependencies (required only for Linux / WebKitGTK)
      - name: Install system dependencies (Linux only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      # 5. Install frontend dependencies inside the desktop subfolder
      - name: Install frontend dependencies
        run: |
          cd desktop
          npm ci

      # 6. Run the Tauri compiler & optionally publish a GitHub release
      - name: Build and Package Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Directs Tauri action to build within the desktop/ subdirectory
          projectPath: 'desktop'
          # Options for automated releases (releases are drafted only on version tag push)
          tagName: v__VERSION__
          releaseName: 'GesturePro Desktop v__VERSION__'
          releaseBody: 'Automated release of GesturePro Desktop.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # 7. Upload build artifacts (fallback to save installers to GHA run artifacts)
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gesturepro-${{ matrix.platform }}-${{ matrix.target }}
          path: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/
          if-no-files-found: warn